# Репозиторий только с Django (manage.py в корне репо, как ParkNetBackend):
#   положи этот файл в КОРЕНЬ репозитория как render.yaml
#   в Render: Blueprint → путь render.yaml, поле Root Directory оставь ПУСТЫМ.
#
# Если когда-нибудь деплоишь из монорепо ParkNet (рядом папки mobile и backend):
#   добавь сюда строку:  rootDir: backend

databases:
  - name: parknet-db
    databaseName: parknet
    user: parknet
    plan: free

services:
  - type: web
    name: parknet-api
    runtime: python
    plan: free
    region: frankfurt
    # migrate НЕ в build: на Render сборка без доступа к DNS Postgres (dpg-... → ошибка).
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --no-input
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/parks/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: parknet-db
          property: connectionString
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
